<div class="login-box">
   <div class="login-container">
      <span class="login-title">เข้าสู่ระบบ</span>
      <div class="login-subtitle">เข้าสู่ระบบด้วย:</div>
      <div class="icon-container">
         <img src="/assets/facebook.png" alt="facebook" class="icon" />
         <img src="/assets/google.png" alt="google" class="icon" />
      </div>
      <span class="or-text">หรือ:</span>
      <mat-form-field appearance="outline" class="input-field">
         <mat-label>อีเมล</mat-label>
         <input matInput />
      </mat-form-field>
      <mat-form-field appearance="outline" class="input-field">
         <mat-label>รหัสผ่าน</mat-label>
         <input matInput type="password" />
      </mat-form-field>
      <div class="login-actions">
         <a href="#" class="forgot-password">ลืมรหัสผ่าน?</a>
      </div>
      <button mat-raised-button color="primary" class="login-button">เข้าสู่ระบบ</button>
      <a href="#" class="register-link">สมัครสมาชิก</a>
   </div>  
</div>
